<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>404 - Not Found | VloStudios</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .box {
            max-width: 500px;
            padding: 20px;
        }

        h1 {
            font-size: 80px;
            margin: 0;
            color: #4f46e5;
        }

        p {
            opacity: 0.7;
            margin-top: 10px;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 16px;
            background: #4f46e5;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        a:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>
<div class="box">
    <h1>404</h1>
    <p>Page not found. You probably typed something wrong 😏</p>
    <a href="/">Go Home</a>
</div>
</body>
</html>
