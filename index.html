<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vlo — Pop Vlad-Andrei · Hobby Developer</title>
  <meta name="description" content="Portfolio of Vlo (Pop Vlad-Andrei) — Python enthusiast, game tinkerer, ice tea lover. Projects synced live from GitHub.">

  <link rel="icon" type="image/png" href="/public/favicon.png" />
  <link rel="apple-touch-icon" href="/public/favicon.png" />

  <style>
    :root {
      color-scheme: dark;
      --background: #101521;
      --foreground: #fff8dd;
      --card: #171d2b;
      --primary: #f1bb42;
      --primary-foreground: #101521;
      --accent: #32c991;
      --muted: #252c3d;
      --muted-foreground: #c7bea7;
      --border: #3d4352;
      --destructive: #f06c55;
      --gradient-hero: radial-gradient(ellipse at top, rgba(104, 77, 22, 0.58), transparent 60%), linear-gradient(180deg, #101521, #0c111b);
      --gradient-amber: linear-gradient(135deg, #ffd56a, #e89531);
      --shadow-glow: 0 20px 60px -20px rgba(241, 187, 66, 0.5);
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--gradient-hero);
      color: var(--foreground);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .container {
      width: min(1120px, calc(100% - 48px));
      margin: 0 auto;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 24px 0;
    }

    .brand {
      font-size: 14px;
      font-weight: 700;
      font-family: ui-monospace, monospace;
    }

    .brand span { color: var(--primary); }

    .nav-links {
      display: flex;
      gap: 20px;
      color: var(--muted-foreground);
      font-size: 14px;
    }

    .hero {
      padding: 64px 0 96px;
    }

    h1 {
      font-size: clamp(48px, 9vw, 96px);
      line-height: 0.95;
    }

    .gradient-name {
      background: var(--gradient-amber);
      -webkit-background-clip: text;
      color: transparent;
    }

    .hero-copy {
      margin-top: 16px;
      max-width: 720px;
      color: var(--muted-foreground);
      font-size: 22px;
    }

    .repo-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .repo {
      display: flex;
      flex-direction: column;
      padding: 20px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--card);
      transition: transform 160ms ease;
    }

    .repo:hover {
      transform: translateY(-2px);
    }

    .repo h3 {
      margin: 0;
      font-size: 16px;
    }

    .repo p {
      color: var(--muted-foreground);
      font-size: 14px;
    }

    .skeleton {
      height: 190px;
      border-radius: 12px;
      background: var(--card);
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }

    footer {
      border-top: 1px solid var(--border);
      padding: 40px 0;
      color: var(--muted-foreground);
      font-size: 14px;
    }

    @media (max-width: 840px) {
      .repo-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 640px) {
      .repo-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
<nav class="container nav">
  <div class="brand"><span>&gt;</span> vlo.py</div>
  <div class="nav-links">
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
  </div>
</nav>

<section class="container hero">
  <h1>Hi, I'm <span class="gradient-name">Vlo</span>.</h1>
  <p class="hero-copy">Pop Vlad-Andrei — hobby developer, Python enjoyer, overthinking projects too much.</p>
</section>

<section class="container" id="projects">
  <h2>Projects</h2>
  <div id="repo-state" class="repo-grid">
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  </div>
</section>

<footer class="container">
  © <span id="year"></span> Pop Vlad-Andrei
</footer>

<script>
  const repoState = document.getElementById("repo-state");

  document.getElementById("year").textContent = new Date().getFullYear();

  async function fetchRepos() {
    try {
      const res = await fetch("https://api.github.com/users/VloStudios/repos?per_page=100");
      const repos = await res.json();

      repoState.innerHTML = repos
              .filter(r => !r.fork)
              .map(r => `
              <a class="repo" href="${r.html_url}" target="_blank">
                <h3>${r.name}</h3>
                <p>${r.description || "No description"}</p>
              </a>
            `).join("");

    } catch (e) {
      repoState.innerHTML = "<p>Failed to load GitHub repos 😭</p>";
    }
  }

  fetchRepos();
</script>
</body>
</html>
